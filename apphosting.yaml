runConfig:
  minInstances: 0

env:
  - variable: FIREBASE_PROJECT_ID
    value: camikey
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_APP_URL
    value: http://localhost:3000
    availability:
      - BUILD
      - RUNTIME

  - variable: SOLANA_RPC_URL
    secret: SOLANA_RPC_URL
    availability:
      - RUNTIME

  - variable: PLATFORM_TREASURY
    secret: PLATFORM_TREASURY
    availability:
      - RUNTIME

  - variable: PAYMENT_ENCRYPTION_KEY
    secret: PAYMENT_ENCRYPTION_KEY
    availability:
      - RUNTIME

  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability:
      - RUNTIME
